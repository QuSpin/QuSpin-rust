name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      # maturin develop compiles quspin-core + quspin-py; subsequent
      # cargo steps reuse these artifacts incrementally.
      - name: Build extension (maturin develop)
        run: uv run maturin develop

      - name: pytest
        run: uv run pytest python/tests/ -x -q

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
