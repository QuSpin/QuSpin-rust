name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --group dev --no-install-project

      # maturin develop compiles quspin-core + quspin-py; subsequent
      # cargo steps reuse these artifacts incrementally.
      - name: Build extension (maturin develop)
        run: uv run maturin develop

      - name: pytest
        run: uv run --locked pytest python/tests/ -x -q

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      # Enforces the basis/operator DAG invariant that the StateTransitions
      # refactor was designed to achieve. A plain `cargo build` does NOT
      # catch someone reintroducing `quspin-operator` to quspin-basis's
      # `[dependencies]` — adding the edge compiles fine, it just defeats
      # the parallel-compile goal. `--edges=normal` excludes dev-deps, so
      # the `[dev-dependencies]` entry on quspin-basis doesn't trigger it.
      - name: Verify basis/operator dependency isolation
        run: |
          # Run cargo tree as its own command so a tool failure surfaces as
          # a CI failure, rather than being silently swallowed by grep.
          tree_output="$(cargo tree -p quspin-basis --edges=normal)"
          ! printf '%s\n' "$tree_output" | grep -q quspin-operator
